<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mi Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: #0f172a;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }

    .logo h1 { font-size: 1.3rem; color: #f8fafc; font-weight: 700; }
    .logo span { font-size: 0.75rem; color: #64748b; display: block; }

    .tabs {
      display: flex;
      background: rgba(15,23,42,0.5);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
    }

    .tab {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      border-radius: 8px;
      color: #64748b;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.25s;
      border: none;
      background: none;
    }

    .tab.active {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      box-shadow: 0 4px 15px rgba(59,130,246,0.3);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .input-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(15,23,42,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #f8fafc;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 0.3px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59,130,246,0.4);
    }

    .btn:active { transform: translateY(0); }

    .msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    .msg.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .msg.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <span class="material-symbols-rounded" style="color: white; font-size: 28px;">rocket_launch</span>
      </div>
      <div>
        <h1>Mi Sistema</h1>
        <span>Panel de control empresarial</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="sec-login">
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="login-email" placeholder="tu@correo.com">
      </div>
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()">Entrar al Sistema</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- REGISTRO -->
    <div class="form-section" id="sec-register">
      <div class="input-group">
        <label>Nombre Completo</label>
        <input type="text" id="reg-name" placeholder="Carlos García">
      </div>
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="reg-email" placeholder="tu@correo.com">
      </div>
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn" onclick="register()">Crear Cuenta</button>
      <div class="msg" id="reg-msg"></div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('sec-' + tab).classList.add('active');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMsg('login-msg', 'Completa todos los campos', 'error');

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        sessionStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } else {
        showMsg('login-msg', '❌ Correo o contraseña incorrectos', 'error');
      }
    }

    async function register() {
      const fullName = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      if (!fullName || !email || !password) return showMsg('reg-msg', 'Completa todos los campos', 'error');

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, password })
      });
      const data = await res.json();
      if (data.success) {
        showMsg('reg-msg', '✅ Cuenta creada. ¡Ya puedes iniciar sesión!', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showMsg('reg-msg', '❌ ' + data.error, 'error');
      }
    }
  </script>
</body>
</html>
