version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: inventory_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "3306:3306" # Para que puedas conectarte con HeidiSQL
    volumes:
      - db_data:/var/lib/mysql

  web:
    image: node:18-alpine
    container_name: inventory_web
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && node server.js"
    depends_on:
      - db

volumes:
  db_data:
